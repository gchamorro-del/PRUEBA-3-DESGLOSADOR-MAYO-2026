<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Optimizador de Cortes</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <!-- LOGIN -->
  <div id="login">
    <h2>Login</h2>
    <input type="text" id="usuario" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
  </div>

  <!-- PLATAFORMA -->
  <div id="plataforma" style="display:none;">
    <h2>Proyecto</h2>
    <input type="text" id="nombreProyecto" placeholder="Nombre del proyecto">

    <h3>Ventanas</h3>
    <div id="ventanas"></div>
    <button onclick="agregarVentana()">Agregar ventana</button>
    <br><br>
    <button onclick="optimizar()">Optimizar cortes</button>
    <canvas id="grafico"></canvas>
    <button onclick="exportarPDF()">Exportar PDF</button>
  </div>

<script>
const desperdicio = 5; // mm por corte
let contadorVentanas = 0;
let resultadoOptimizacion = {};

function login() {
  const user = document.getElementById("usuario").value;
  const pass = document.getElementById("password").value;
  if(user && pass) {
    document.getElementById("login").style.display = "none";
    document.getElementById("plataforma").style.display = "block";
  }
}

function agregarVentana() {
  contadorVentanas++;
  const div = document.createElement("div");
  div.id = "ventana" + contadorVentanas;
  div.innerHTML = `
    <h3>Ventana ${contadorVentanas}</h3>
    <label>ID: <input type="text" id="id${contadorVentanas}" placeholder="V${contadorVentanas}"></label><br>
    <label>Ancho: <input type="number" id="ancho${contadorVentanas}"></label><br>
    <label>Alto: <input type="number" id="alto${contadorVentanas}"></label><br>
    <select id="modelo${contadorVentanas}" onchange="mostrarPerfiles(${contadorVentanas})">
      <option value="">Seleccione modelo...</option>
      <option value="corrediza2">Ventana Corrediza 2 Hojas</option>
    </select>
    <div id="perfiles${contadorVentanas}"></div>
    <hr>
  `;
  document.getElementById("ventanas").appendChild(div);
}

function mostrarPerfiles(num) {
  const modelo = document.getElementById("modelo"+num).value;
  const perfilesDiv = document.getElementById("perfiles"+num);
  perfilesDiv.innerHTML = "";
  if(modelo === "corrediza2") {
    perfilesDiv.innerHTML = `
      <label>MTG2175 (longitud disponible mm): <input type="number" id="MTG2175_${num}"></label><br>
      <label>MTG2177 (longitud disponible mm): <input type="number" id="MTG2177_${num}"></label><br>
      <label>MTG2176 (longitud disponible mm): <input type="number" id="MTG2176_${num}"></label><br>
    `;
  }
}

function optimizar() {
  let tirasPorPerfil = {};

  for(let i=1; i<=contadorVentanas; i++) {
    ["MTG2175","MTG2177","MTG2176"].forEach(id => {
      const longitud = parseInt(document.getElementById(id+"_"+i)?.value || 0);
      if(longitud > 0) {
        if(!tirasPorPerfil[id]) tirasPorPerfil[id] = {longitud: longitud, piezas: []};
        // Ejemplo: cada ventana genera piezas ficticias según ancho/alto
        const ancho = parseInt(document.getElementById("ancho"+i)?.value || 0);
        const alto = parseInt(document.getElementById("alto"+i)?.value || 0);
        if(ancho > 0) tirasPorPerfil[id].piezas.push({id: id+"-V"+i+"-A", medida: ancho});
        if(alto > 0) tirasPorPerfil[id].piezas.push({id: id+"-V"+i+"-H", medida: alto});
      }
    });
  }

  resultadoOptimizacion = {};
  for(const perfil in tirasPorPerfil) {
    const longitudTira = tirasPorPerfil[perfil].longitud;
    const piezas = tirasPorPerfil[perfil].piezas.sort((a,b)=>b.medida-a.medida);
    let tiras = [];

    piezas.forEach(pieza => {
      let colocada = false;
      for (let tira of tiras) {
        const espacioUsado = tira.reduce((sum, p) => sum + p.medida + desperdicio, 0);
        if (espacioUsado + pieza.medida <= longitudTira) {
          tira.push(pieza);
          colocada = true;
          break;
        }
      }
      if (!colocada) tiras.push([pieza]);
    });

    resultadoOptimizacion[perfil] = {tiras, longitud: longitudTira};
  }

  // Gráfico horizontal
  const ctx = document.getElementById("grafico").getContext("2d");
  const labels = [];
  const data = [];
  for(const perfil in resultadoOptimizacion) {
    resultadoOptimizacion[perfil].tiras.forEach((tira, i) => {
      labels.push(`${perfil} - Tira ${i+1}`);
      data.push(tira.reduce((sum, p) => sum + p.medida + desperdicio, 0));
    });
  }

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Uso de tiras (mm)',
        data: data,
        backgroundColor: 'steelblue'
      }]
    },
    options: { indexAxis: 'y' }
  });
}

function exportarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text("Reporte de cortes optimizados", 10, 10);

  let y = 20;
  for(const perfil in resultadoOptimizacion) {
    doc.text(`Perfil ${perfil} (longitud disponible: ${resultadoOptimizacion[perfil].longitud} mm)`, 10, y);
    y += 10;
    resultadoOptimizacion[perfil].tiras.forEach((tira, i) => {
      const usado = tira.reduce((sum, p) => sum + p.medida + desperdicio, 0);
      const eficiencia = ((usado/resultadoOptimizacion[perfil].longitud)*100).toFixed(2);
      doc.text(`Tira ${i+1} - Uso: ${usado} mm (${eficiencia}% aprovechamiento)`, 15, y);
      y += 10;
      tira.forEach(p => {
        doc.text(` - ${p.id}: ${p.medida} mm`, 25, y);
        y += 10;
      });
    });
    y += 10;
  }

  // Exportar gráfico como imagen
  const canvas = document.getElementById("grafico");
  const imgData = canvas.toDataURL("image/png");
  doc.addImage(imgData, 'PNG', 10, y, 180, 100);

  doc.save("cortes.pdf");
}
</script>
</body>
</html>
